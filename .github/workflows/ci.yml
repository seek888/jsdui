name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        node-version: ['20.x']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: TypeScript check
        run: npx vue-tsc --noEmit

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build
        env:
          CI: true

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build:win
        env:
          CI: true

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux
        env:
          CI: true

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist-electron/mac-arm64/*.app
          retention-days: 7

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist-electron/win-unpacked/*.exe
          retention-days: 7

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist-electron/linux-unpacked/*.AppImage
          retention-days: 7

  release:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: dist-electron/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist-electron/win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: dist-electron/linux

      - name: List artifacts
        run: |
          echo "=== macOS ===" && ls -la dist-electron/mac/ 2>/dev/null || echo "No macOS artifacts"
          echo "=== Windows ===" && ls -la dist-electron/win/ 2>/dev/null || echo "No Windows artifacts"
          echo "=== Linux ===" && ls -la dist-electron/linux/ 2>/dev/null || echo "No Linux artifacts"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-electron/mac/**/*
            dist-electron/win/**/*
            dist-electron/linux/**/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
